<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>活動報名表單</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        .form-container { max-width: 400px; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        .item { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        input[type="text"], input[type="date"], select { width: 100%; padding: 8px; margin-top: 5px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>活動報名系統</h2>
        <form action="f03.php" method="POST">
            <div class="item">
                <label>姓名：</label>
                <input type="text" name="name" placeholder="請輸入全名" required>
            </div>

            <div class="item">
                <label>電子郵件 (Email)：</label>
                <input type="text" name="email" placeholder="example@mail.com" required>
            </div>

            <div class="item">
                <label>出生日期：</label>
                <input type="date" name="birthday" required>
            </div>

            <div class="item">
                <label>程式開發經驗：</label>
                <select name="exp">
                    <option value="yes">已有相關經驗</option>
                    <option value="no">初學者（無經驗）</option>
                </select>
            </div>

            <button type="submit">提交申請審核</button>
        </form>
    </div>

</body>
</html>
